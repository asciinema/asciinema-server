name: Test

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

env:
  otp: '26.2.5.7'
  elixir: '1.18.2'
  node: '18.x'
  rust: '1.83.0'

jobs:
  test:
    runs-on: ubuntu-24.04

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      MIX_ENV: test
      CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

    steps:
      - uses: actions/checkout@v3
      - name: Install Erlang & Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.otp }}
          elixir-version: ${{ env.elixir }}
      - name: Install Node
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.node }}
      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: ${{ env.rust }}
          override: true
      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick librsvg2-bin
      - name: Install fd
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL -o /tmp/fd.tar.gz \
            https://github.com/sharkdp/fd/releases/download/v10.2.0/fd-v10.2.0-x86_64-unknown-linux-gnu.tar.gz
          tar -xzf /tmp/fd.tar.gz -C /tmp
          install -m 0755 /tmp/fd-v10.2.0-x86_64-unknown-linux-gnu/fd "$HOME/.local/bin/fd"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Verify system tools
        run: |
          which fd
          fd --version
          which magick
          magick --version
          which rsvg-convert
          rsvg-convert --version
      - name: Cache Mix
        uses: actions/cache@v3
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ env.elixir }}-${{ env.otp }}-${{ env.rust }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ env.elixir }}-${{ env.otp }}-${{ env.rust }}-
      - name: Cache npm dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ env.node }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Cache Rust dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.rustup
            ~/.cargo
          key: ${{ runner.os }}-rust-${{ env.rust }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-${{ env.rust }}-
      - name: Install mix dependencies
        run: mix deps.get
      - name: Check formatting
        run: mix format --check-formatted
      - name: Compile
        run: mix compile
      - name: Install npm dependencies
        run: npm ci --prefix assets
      - name: Setup assets pipeline deps
        run: mix assets.setup
      - name: Build assets
        run: mix assets.build
      - name: Setup database
        run: mix ecto.setup
      - name: Run tests
        run: mix test --include vt
